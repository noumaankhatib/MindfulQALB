        <h1>Mindful QALB — Online Therapy by Aqsa Khatib, Counseling Psychologist</h1>
        <p>Evidence-based mental health care for individuals and couples. Online therapy, counseling, and support groups. Based in Karnataka, India. Serving clients worldwide.</p>
        <h2>About Aqsa Khatib</h2>
        <p>I'm Aqsa Khatib, a licensed Counseling Psychologist with 3,000+ clinical hours. I hold a Master's in Counseling Psychology and am certified in CBT, NLP, EFT, TFT Tapping, Trauma-Informed Care, and Psycho-oncology. I work with individuals and couples across India and internationally, including NRIs.</p>
        <h2>Services &amp; Pricing</h2>
        <ul>
          <li>Free Consultation — 15 minutes, no commitment</li>
          <li>Individual Therapy — Chat (₹499 / 30 min), Audio (₹899 / 45 min), Video (₹1,299 / 60 min)</li>
          <li>Couples Therapy — Video (₹1,999 / 90 min)</li>
          <li>Support Groups — online facilitated group sessions</li>
        </ul>
        <h2>Therapeutic Approaches</h2>
        <p>CBT (Cognitive Behaviour Therapy), ACT (Acceptance &amp; Commitment Therapy), Gestalt Therapy, Solution-Focused Therapy, NLP, EFT, TFT Tapping, Trauma-Informed Care.</p>
        <h2>Frequently Asked Questions</h2>
        <h3>Who can benefit from therapy?</h3>
        <p>Anyone going through emotional, relational, or life challenges can benefit from therapy. Whether you're dealing with anxiety, stress, relationship difficulties, self-esteem issues, life transitions, or simply seeking personal growth—therapy provides a safe space to explore, heal, and grow. You don't need to be in crisis to seek support.</p>
        <h3>Is online therapy effective?</h3>
        <p>Yes, research consistently shows that online therapy can be as effective as in-person therapy for many conditions including anxiety, depression, and relationship issues. Online sessions offer the same quality of care with added convenience—you can attend from the comfort of your home, saving time on commute and maintaining privacy.</p>
        <h3>Is therapy confidential?</h3>
        <p>Absolutely. Confidentiality is the foundation of the therapeutic relationship. Everything discussed in sessions remains strictly private. Secure, encrypted platforms are used for all online sessions.</p>
        <h3>Do you work with NRI / international clients?</h3>
        <p>Yes. All sessions are conducted online, making it convenient regardless of location. Sessions can be scheduled at times that work for your time zone.</p>
        <h3>What types of therapy do you offer?</h3>
        <p>Individual therapy, couples therapy, and workshops. The approach is eclectic—evidence-based methods like CBT, ACT, Solution-Focused Therapy, Gestalt Therapy, and NLP, tailored to what will help most effectively.</p>
